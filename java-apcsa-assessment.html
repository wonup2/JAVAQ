<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Java / AP CS A Style Assessment - 8th Grade</title>
<style>
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #d9dee8;
    --accent: #2563eb;
    --good: #166534;
    --bad: #991b1b;
    --good-bg: #dcfce7;
    --bad-bg: #fee2e2;
    --soft: #eef2ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
  }
  header {
    background: linear-gradient(135deg, #1d4ed8, #4338ca);
    color: white;
    padding: 30px 20px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { margin: 0 0 8px; font-size: 30px; }
  .subtitle { margin: 0; opacity: 0.95; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin: 18px 0;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
  }
  .toolbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    align-items: end;
  }
  label.small { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; font-weight: 700; }
  input[type="text"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: white;
  }
  button {
    border: 0;
    border-radius: 10px;
    padding: 10px 14px;
    font-weight: 700;
    cursor: pointer;
    background: var(--accent);
    color: white;
  }
  button.secondary { background: #334155; }
  button.light { background: #e5e7eb; color: #111827; }
  .button-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .pill { background: var(--soft); color: #3730a3; padding: 6px 10px; border-radius: 999px; font-size: 13px; font-weight: 700; }
  details.chapter {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 14px 0;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
  }
  details.chapter > summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 18px;
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
    font-weight: 800;
    font-size: 19px;
  }
  details.chapter > summary::-webkit-details-marker { display: none; }
  .chapter-body { padding: 16px; }
  .question-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin: 0 0 14px;
    background: #fff;
  }
  .question-title { font-weight: 800; margin-bottom: 10px; }
  pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #111827;
    color: #f9fafb;
    border-radius: 12px;
    padding: 14px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.45;
  }
  .choices { display: grid; gap: 8px; margin-top: 10px; }
  .choice {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 8px;
    align-items: start;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    background: #ffffff;
  }
  .choice:hover { border-color: #93c5fd; background: #f8fbff; }
  .choice input { margin-top: 3px; }
  .result-note {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    display: none;
    font-size: 14px;
  }
  .correct-card { border-color: #86efac; background: #f7fff9; }
  .wrong-card { border-color: #fca5a5; background: #fff7f7; }
  .result-note.good { display: block; background: var(--good-bg); color: var(--good); }
  .result-note.bad { display: block; background: var(--bad-bg); color: var(--bad); }
  .summary-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .summary-table th, .summary-table td { border: 1px solid var(--border); padding: 9px; text-align: left; }
  .summary-table th { background: #f8fafc; }
  #resultBox { display: none; }
  textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    font-family: Consolas, monospace;
  }
  .sticky-submit {
    position: sticky;
    bottom: 0;
    background: rgba(246,247,251,0.92);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    padding: 12px 0;
    margin-top: 20px;
  }
  .hide { display: none !important; }
  @media (max-width: 760px) {
    .toolbar { grid-template-columns: 1fr; }
    h1 { font-size: 24px; }
  }
  @media print {
    .toolbar, .button-row, .sticky-submit, #copyArea { display: none !important; }
    body { background: white; }
    .panel, details.chapter, .question-card { box-shadow: none; break-inside: avoid; }
  }
</style>
</head>

<header>
  <div class="wrap">
    <h1>Java / AP CS A Style Assessment</h1>
    <p class="subtitle">For 8th-grade students with 6+ months of Java experience · 95 total questions · 5 questions per chapter</p>
  </div>
</header>

<main class="wrap">

        </select>
      </div>
      <div>
        <label class="small" for="modeFilter">View</label>
        <select id="modeFilter">
          <option value="all">All Questions</option>
          <option value="unanswered">Unanswered Only</option>
        </select>
      </div>
    </div>
    <div class="meta">
      <span class="pill" id="totalCount">95 Questions</span>
      <span class="pill">Suggested Time: 90–110 minutes</span>
      <span class="pill">AP CS A Style MCQ</span>
      <span class="pill">Auto-Graded After Submit</span>
    </div>
    <div class="button-row">
      <button onclick="gradeQuiz()">Submit / Grade</button>
      <button class="secondary" onclick="expandAll(true)">Open All Chapters</button>
      <button class="secondary" onclick="expandAll(false)">Close All Chapters</button>
      <button class="light" onclick="resetQuiz()">Reset</button>
      <button class="light" onclick="window.print()">Print / Save as PDF</button>
    </div>
  </section>

  <section id="resultBox" class="panel">
    <h2>Score Report</h2>
    <div id="scoreText"></div>
    <div id="chapterScores"></div>
    <div id="copyArea" style="margin-top:14px;">
      <label class="small" for="resultText">Copy-Friendly Result Summary</label>
      <textarea id="resultText" readonly></textarea>
      <div class="button-row">
        <button class="secondary" onclick="copyResult()">Copy Result</button>
      </div>
    </div>
  </section>

  <section id="quiz"></section>

  <div class="sticky-submit">
    <div class="wrap button-row" style="margin-top:0;">
      <button onclick="gradeQuiz()">Submit / Grade</button>
      <button class="light" onclick="scrollToTop()">Top</button>
    </div>
  </div>
</main>

const quizEl = document.getElementById('quiz');
const chapterFilter = document.getElementById('chapterFilter');
const modeFilter = document.getElementById('modeFilter');
const chapters = [...new Set(QUESTIONS.map(q => q.chapter))];

function escapeText(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function initFilters() {
  chapters.forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch;
    opt.textContent = ch;
    chapterFilter.appendChild(opt);
  });
  chapterFilter.addEventListener('change', renderQuiz);
  modeFilter.addEventListener('change', renderQuiz);
}

function getAnswer(index) {
  const checked = document.querySelector(`input[name="q${index}"]:checked`);
  return checked ? Number(checked.value) : null;
}

function renderQuiz() {
  const selectedChapter = chapterFilter.value;
  const mode = modeFilter.value;
  quizEl.innerHTML = '';
  chapters.forEach((chapter, chapterIndex) => {
    if (selectedChapter !== 'all' && selectedChapter !== chapter) return;
    const chapterQuestions = QUESTIONS
      .map((q, originalIndex) => ({...q, originalIndex}))
      .filter(q => q.chapter === chapter)
      .filter(q => mode !== 'unanswered' || getAnswer(q.originalIndex) === null);
    if (chapterQuestions.length === 0) return;

    const details = document.createElement('details');
    details.className = 'chapter';
    details.open = selectedChapter !== 'all' || chapterIndex < 2;
    const summary = document.createElement('summary');
    summary.textContent = `${chapter} (${chapterQuestions.length} questions)`;
    details.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'chapter-body';

    chapterQuestions.forEach((q) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `card-${q.originalIndex}`;
      const num = q.originalIndex + 1;
      let html = `<div class="question-title">Q${num}. ${escapeText(q.q)}</div>`;
      if (q.code && q.code.trim()) {
        html += `<pre>${escapeText(q.code)}</pre>`;
      }
      html += `<div class="choices">`;
      q.choices.forEach((choice, cIndex) => {
        const checked = getAnswer(q.originalIndex) === cIndex ? 'checked' : '';
        html += `
          <label class="choice">
            <input type="radio" name="q${q.originalIndex}" value="${cIndex}" ${checked} />
            <span>${String.fromCharCode(65 + cIndex)}. ${escapeText(choice)}</span>
          </label>`;
      });
      html += `</div><div class="result-note" id="note-${q.originalIndex}"></div>`;
      card.innerHTML = html;
      body.appendChild(card);
    });

    details.appendChild(body);
    quizEl.appendChild(details);
  });
}

function gradeQuiz() {
  let correct = 0;
  let answered = 0;
  const chapterStats = {};
  chapters.forEach(ch => chapterStats[ch] = {correct: 0, total: 0});

  QUESTIONS.forEach((q, index) => {
    const selected = getAnswer(index);
    chapterStats[q.chapter].total++;
    const card = document.getElementById(`card-${index}`);
    const note = document.getElementById(`note-${index}`);
    if (selected !== null) answered++;
    const isCorrect = selected === q.answer;
    if (isCorrect) {
      correct++;
      chapterStats[q.chapter].correct++;
    }
    if (card && note) {
      card.classList.remove('correct-card', 'wrong-card');
      note.classList.remove('good', 'bad');
      if (isCorrect) {
        card.classList.add('correct-card');
        note.classList.add('good');
        note.textContent = `Correct. ${q.explanation}`;
      } else {
        card.classList.add('wrong-card');
        note.classList.add('bad');
        const chosenText = selected === null ? 'No answer selected' : `${String.fromCharCode(65 + selected)}. ${q.choices[selected]}`;
        note.textContent = `Incorrect. Your answer: ${chosenText}. Correct answer: ${String.fromCharCode(65 + q.answer)}. ${q.choices[q.answer]}. ${q.explanation}`;
      }
    }
  });

  const percent = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('scoreText').innerHTML = `<h3>Total Score: ${correct} / ${QUESTIONS.length} (${percent}%)</h3><p>Answered: ${answered} / ${QUESTIONS.length}</p>`;

  let table = '<table class="summary-table"><thead><tr><th>Chapter</th><th>Score</th><th>Percent</th></tr></thead><tbody>';
  chapters.forEach(ch => {
    const s = chapterStats[ch];
    const p = Math.round((s.correct / s.total) * 100);
    table += `<tr><td>${escapeText(ch)}</td><td>${s.correct} / ${s.total}</td><td>${p}%</td></tr>`;
  });
  table += '</tbody></table>';
  document.getElementById('chapterScores').innerHTML = table;

  const name = document.getElementById('studentName').value.trim() || 'Student';
  let summary = `Java / AP CS A Style Assessment Result
Student: ${name}
Total Score: ${correct} / ${QUESTIONS.length} (${percent}%)
Answered: ${answered} / ${QUESTIONS.length}

Chapter Scores:
`;
  chapters.forEach(ch => {
    const s = chapterStats[ch];
    const p = Math.round((s.correct / s.total) * 100);
    summary += `- ${ch}: ${s.correct} / ${s.total} (${p}%)
`;
  });
  document.getElementById('resultText').value = summary;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  if (!confirm('Reset all answers?')) return;
  document.querySelectorAll('input[type="radio"]').forEach(input => input.checked = false);
  document.querySelectorAll('.question-card').forEach(card => card.classList.remove('correct-card', 'wrong-card'));
  document.querySelectorAll('.result-note').forEach(note => {
    note.className = 'result-note';
    note.textContent = '';
  });
  document.getElementById('resultBox').style.display = 'none';
  renderQuiz();
}

function expandAll(open) {
  document.querySelectorAll('details.chapter').forEach(d => d.open = open);
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult() {
  const area = document.getElementById('resultText');
  area.select();
  document.execCommand('copy');
  alert('Result copied.');
}

initFilters();
renderQuiz();
</script>
</body>
</html>
